{% extends 'base.html' %}
{% block content %}

<!-- QR/Barcode Scanner Library -->
<script src="https://unpkg.com/html5-qrcode"></script>

<div class="container mt-5">

    <h4 id="page-title" class="mb-4 text-center text-primary">
        <i class="bi bi-book-half"></i> Add Book
    </h4>

    <div class="card shadow-sm rounded p-4 mx-auto" style="max-width: 500px;">

        <div class="mb-3">
            <label for="flb_id" class="form-label fw-bold">FLB_ID</label>
            <input id="flb_id" type="text" class="form-control form-control-lg" placeholder="Enter FLB ID (e.g. FLB_001)">
        </div>

        <!-- Barcode Scanner Section -->
        <div id="barcode-scanner-container" class="mb-4 text-center">
            <button id="toggle-barcode-scanner" class="btn btn-outline-dark btn-sm mb-2">
                <i class="bi bi-barcode-scan"></i> Scan Barcode (ISBN)
            </button>
            <div id="barcode-reader" style="width: 100%; display: none;"></div>
            <p id="barcode-scan-result" class="small text-success mt-2 fw-bold" style="display: none;"></p>
        </div>

        <div class="mb-3">
            <label for="title" class="form-label fw-bold">Book Title</label>
            <input id="title" type="text" class="form-control form-control-lg" placeholder="Enter book title">
        </div>

        <div class="mb-3">
            <label for="author" class="form-label fw-bold">Author</label>
            <input id="author" type="text" class="form-control form-control-lg" placeholder="Enter author name">
        </div>

        <div class="mb-3">
            <label for="category" class="form-label fw-bold">Category</label>
            <input id="category" type="text" class="form-control form-control-lg" placeholder="Enter category">
        </div>

        <div class="mb-4">
            <label for="total" class="form-label fw-bold">Total Copies</label>
            <input id="total" type="number" class="form-control form-control-lg" placeholder="Enter total copies">
        </div>

        <button class="btn btn-success w-100 btn-lg fw-bold" onclick="saveBook()">
            <i class="bi bi-save2-fill"></i> Save Book
        </button>

    </div>
</div>

<script>
const token = localStorage.getItem("access");
if (!token) window.location.href = "/";

// Check permissions
fetch("/api/auth/me/", {
    headers: { Authorization: "Bearer " + token }
})
.then(res => res.json())
.then(user => {
    if (!user.is_superuser && !user.is_staff) {
        alert("Access Denied: Admins only.");
        window.location.href = "/home/";
    }
});

// DOM Elements
const authorEl = document.getElementById("author");
const categoryEl = document.getElementById("category");

// ------------------- BARCODE SCANNER -------------------
let html5BarcodeScanner;
const toggleBarcodeBtn = document.getElementById("toggle-barcode-scanner");
const barcodeReader = document.getElementById("barcode-reader");
const barcodeScanResult = document.getElementById("barcode-scan-result");

toggleBarcodeBtn.addEventListener("click", () => {
    if (barcodeReader.style.display === "none") {
        barcodeReader.style.display = "block";
        toggleBarcodeBtn.innerHTML = '<i class="bi bi-x-circle-fill"></i> Stop Scanner';
        startBarcodeScanner();
    } else {
        stopBarcodeScanner();
    }
});

function startBarcodeScanner() {
    html5BarcodeScanner = new Html5Qrcode("barcode-reader");
    const config = { fps: 10, qrbox: { width: 250, height: 150 } }; // Wider box for barcodes

    html5BarcodeScanner.start({ facingMode: "environment" }, config, onBarcodeScanSuccess)
    .catch(err => {
        console.error("Camera Error:", err);
        alert("Camera access failed. Check permissions.");
        stopBarcodeScanner();
    });
}

async function onBarcodeScanSuccess(decodedText) {
    const barcode = decodedText.trim();
    barcodeScanResult.innerText = `🔍 Searching for barcode: ${barcode}...`;
    barcodeScanResult.style.display = "block";
    stopBarcodeScanner();

    try {
        // Fetch book details from Google Books API
        const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${barcode}`);
        const data = await response.json();

        if (data.totalItems > 0) {
            const bookInfo = data.items[0].volumeInfo;
            document.getElementById("title").value = bookInfo.title || "";
            
            // Note: Author and Category need to exist in our DB first. 
            // For now, we'll alert the user to select them manually or we could try to find/create them.
            // But let's keep it simple: fill the title and show success.
            
            barcodeScanResult.innerText = `✅ Found: ${bookInfo.title}`;
            alert(`Found: ${bookInfo.title}. Please select the Author and Category manually.`);
        } else {
            barcodeScanResult.innerText = `❌ No book found for barcode: ${barcode}`;
            alert("No book details found for this barcode. Please enter manually.");
        }
    } catch (err) {
        console.error("Fetch error:", err);
        barcodeScanResult.innerText = "❌ Error fetching book details.";
    }
}

function stopBarcodeScanner() {
    if (html5BarcodeScanner) {
        html5BarcodeScanner.stop().then(() => {
            barcodeReader.style.display = "none";
            toggleBarcodeBtn.innerHTML = '<i class="bi bi-barcode-scan"></i> Scan Barcode (ISBN)';
        }).catch(err => console.error(err));
    } else {
        barcodeReader.style.display = "none";
        toggleBarcodeBtn.innerHTML = '<i class="bi bi-barcode-scan"></i> Scan Barcode (ISBN)';
    }
}

// Extract book ID from URL
const pathParts = window.location.pathname.split("/").filter(Boolean);
let bookId = pathParts[pathParts.length - 1] === "edit" 
    ? pathParts[pathParts.length - 2] 
    : null;

if (bookId) document.getElementById("page-title").innerText = "Update Book";

// Maps
let authorsMap = {};

// ---------------- LOAD BOOK FOR EDIT ----------------
function loadBook() {
    if (!bookId) return;

    fetch(`/api/books/${bookId}/`, {
        headers: { Authorization: "Bearer " + token }
    })
    .then(res => res.json())
    .then(book => {
        document.getElementById("flb_id").value = book.flb_id || "";
        document.getElementById("title").value = book.title;
        document.getElementById("total").value = book.total_copies;
        document.getElementById("author").value = book.author_name || "";
        document.getElementById("category").value = book.category_name || "";
    })
    .catch(err => console.error(err));
}

// ---------------- INITIALIZE ----------------
loadBook();

// ---------------- SAVE BOOK ----------------
async function saveBook() {
    const flb_id = document.getElementById("flb_id").value.trim();
    const title = document.getElementById("title").value.trim();
    const author = document.getElementById("author").value.trim();
    const category = document.getElementById("category").value.trim();
    const total = Number(document.getElementById("total").value);

    if (!title || !author || !category) {
        alert("All fields are required");
        return;
    }

    const payload = {
        flb_id,
        title,
        author_name: author,
        category_name: category,
        total_copies: total
    };

    const apiUrl = bookId 
        ? `/api/books/${bookId}/` 
        : `/api/books/`;

    fetch(apiUrl, {
        method: bookId ? "PUT" : "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify(payload)
    })
    .then(async res => {
        const isJson = res.headers.get('content-type')?.includes('application/json');
        const data = isJson ? await res.json() : null;

        if (!res.ok) {
            const errorMsg = data?.error || data?.detail || (await res.text()).slice(0, 100) || "Failed to save book";
            throw new Error(errorMsg);
        }
        return data;
    })
    .then(() => {
        alert("Book saved successfully");
        window.location.href = "/books-list/";
    })
    .catch(err => {
        console.error("Save Error:", err);
        alert("Error: " + err.message);
    });
}
</script>

{% endblock %}
