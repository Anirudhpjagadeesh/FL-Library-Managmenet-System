{% extends 'base.html' %}
{% block content %}

<!-- QR Scanner Library -->
<script src="https://unpkg.com/html5-qrcode"></script>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-warning text-dark text-center">
                    <h4 class="mb-0">
                        <i class="bi bi-journal-bookmark-fill"></i> Issue Book
                    </h4>
                </div>
                <div class="card-body">

                    <!-- Unified Search Book -->
                    <div class="mb-3 position-relative">
                        <label for="book_search" class="form-label fw-bold">Search Book (by Title or FLB_ID)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                            <input type="text" id="book_search" class="form-control" 
                                   placeholder="Type book title or FLB_ID..." autocomplete="off">
                        </div>
                        <!-- Hidden field for selected book ID -->
                        <input type="hidden" id="selected_book_id">
                        
                        <!-- Search Results Dropdown -->
                        <div id="search-results" class="list-group position-absolute w-100 shadow-lg mt-1" 
                             style="z-index: 1050; max-height: 250px; overflow-y: auto; display: none;">
                        </div>
                    </div>

                    <!-- QR/Barcode Code Scanner Section -->
                    <div id="qr-scanner-container" class="mb-4 text-center">
                        <button id="toggle-scanner" class="btn btn-outline-dark btn-sm mb-2">
                            <i class="bi bi-qr-code-scan"></i> Scan QR/Barcode
                        </button>
                        <div id="reader" style="width: 100%; display: none;"></div>
                        <p id="scan-result" class="small text-success mt-2 fw-bold" style="display: none;"></p>
                    </div>

                    <!-- Select User -->
                    <div id="user-selection-group" class="mb-4 position-relative">
                        <label for="user_search" class="form-label fw-bold">Search User (by Name or Email)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-person-search"></i></span>
                            <input type="text" id="user_search" class="form-control" 
                                   placeholder="Type student name or email..." autocomplete="off">
                        </div>
                        <!-- Hidden field for selected user ID -->
                        <input type="hidden" id="selected_user_id">
                        
                        <!-- User Search Results Dropdown -->
                        <div id="user-search-results" class="list-group position-absolute w-100 shadow-lg mt-1" 
                             style="z-index: 1050; max-height: 200px; overflow-y: auto; display: none;">
                        </div>
                    </div>

                    <!-- Issue Button -->
                    <button id="issue-btn" class="btn btn-warning w-100 fw-bold" onclick="issueBook()">
                        <i class="bi bi-send-fill"></i> Issue Book
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const token = localStorage.getItem("access");
if (!token) window.location.href = "/";

const bookSearchInput = document.getElementById("book_search");
const selectedBookIdInput = document.getElementById("selected_book_id");
const searchResultsContainer = document.getElementById("search-results");

const userSearchInput = document.getElementById("user_search");
const selectedUserIdInput = document.getElementById("selected_user_id");
const userSearchResultsContainer = document.getElementById("user-search-results");

const issueBtn = document.getElementById("issue-btn");

let allBooks = []; // To store the list of books locally for searching
let allUsers = []; // To store the list of users locally for searching

// ------------------- BOOK SEARCH LOGIC -------------------
bookSearchInput.addEventListener("input", function() {
    const query = this.value.trim().toLowerCase();
    if (query.length < 1) {
        searchResultsContainer.style.display = "none";
        return;
    }

    const filtered = allBooks.filter(book => {
        const titleMatch = book.title.toLowerCase().includes(query);
        const flbIdMatch = (book.flb_id || "").toLowerCase().includes(query);
        return titleMatch || flbIdMatch;
    });

    displaySearchResults(filtered);
});

function displaySearchResults(results) {
    if (results.length === 0) {
        searchResultsContainer.innerHTML = '<div class="list-group-item text-muted">No books found</div>';
    } else {
        searchResultsContainer.innerHTML = results.map(book => {
            const flbText = book.flb_id ? `<span class="badge bg-primary me-2">${book.flb_id}</span>` : "";
            const disabledClass = book.available_copies === 0 ? "disabled text-muted bg-light" : "list-group-item-action";
            const availabilityText = book.available_copies === 0 ? " (Out of Stock)" : ` (${book.available_copies} available)`;
            
            return `
                <a href="javascript:void(0)" 
                   class="list-group-item list-group-item-action ${disabledClass}" 
                   onclick="${book.available_copies > 0 ? `selectBook(${book.id}, '${book.title.replace(/'/g, "\\'")}', '${(book.flb_id || '').replace(/'/g, "\\'")}')` : ''}">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>${flbText} <strong>${book.title}</strong></div>
                        <small class="text-muted">${availabilityText}</small>
                    </div>
                </a>
            `;
        }).join("");
    }
    searchResultsContainer.style.display = "block";
}

function selectBook(id, title, flbId) {
    selectedBookIdInput.value = id;
    const displayText = flbId ? `[${flbId}] ${title}` : title;
    bookSearchInput.value = displayText;
    searchResultsContainer.style.display = "none";
}

// ------------------- USER SEARCH LOGIC -------------------
userSearchInput.addEventListener("input", function() {
    const query = this.value.trim().toLowerCase();
    if (query.length < 1) {
        userSearchResultsContainer.style.display = "none";
        return;
    }

    const filtered = allUsers.filter(user => {
        const nameMatch = user.username.toLowerCase().includes(query);
        const emailMatch = (user.email || "").toLowerCase().includes(query);
        return nameMatch || emailMatch;
    });

    displayUserSearchResults(filtered);
});

function displayUserSearchResults(results) {
    if (results.length === 0) {
        userSearchResultsContainer.innerHTML = '<div class="list-group-item text-muted">No users found</div>';
    } else {
        userSearchResultsContainer.innerHTML = results.map(user => {
            return `
                <a href="javascript:void(0)" 
                   class="list-group-item list-group-item-action" 
                   onclick="selectUser(${user.id}, '${user.username.replace(/'/g, "\\'")}', '${(user.email || '').replace(/'/g, "\\'")}')">
                    <div class="d-flex justify-content-between align-items-center">
                        <div><strong>${user.username}</strong></div>
                        <small class="text-muted">${user.email || ""}</small>
                    </div>
                </a>
            `;
        }).join("");
    }
    userSearchResultsContainer.style.display = "block";
}

function selectUser(id, username, email) {
    selectedUserIdInput.value = id;
    const displayText = email ? `${username} (${email})` : username;
    userSearchInput.value = displayText;
    userSearchResultsContainer.style.display = "none";
}

// Close results when clicking outside
document.addEventListener("click", function(e) {
    if (e.target !== bookSearchInput && e.target !== searchResultsContainer) {
        searchResultsContainer.style.display = "none";
    }
    if (e.target !== userSearchInput && e.target !== userSearchResultsContainer) {
        userSearchResultsContainer.style.display = "none";
    }
});

// ------------------- QR CODE SCANNER -------------------
let html5QrCode;
const toggleScannerBtn = document.getElementById("toggle-scanner");
const reader = document.getElementById("reader");
const scanResult = document.getElementById("scan-result");

toggleScannerBtn.addEventListener("click", () => {
    if (reader.style.display === "none") {
        reader.style.display = "block";
        toggleScannerBtn.innerHTML = '<i class="bi bi-x-circle-fill"></i> Stop Scanner';
        startScanner();
    } else {
        stopScanner();
    }
});

function startScanner() {
    html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 10, qrbox: { width: 250, height: 150 } }; // Wider for barcodes

    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
    .catch(err => {
        console.error("Camera Error:", err);
        alert("Camera access failed. Check permissions.");
        stopScanner();
    });
}

function onScanSuccess(decodedText) {
    // The QR code can contain the FLB_ID or the Book ID
    const scannedVal = decodedText.trim().toUpperCase();
    
    // Check if the value matches any FLB_ID or ID in our loaded list
    const foundBook = allBooks.find(book => {
        const flbIdMatch = (book.flb_id || "").toUpperCase() === scannedVal;
        const idMatch = String(book.id) === scannedVal;
        return flbIdMatch || idMatch;
    });

    if (foundBook) {
        if (foundBook.available_copies > 0) {
            selectBook(foundBook.id, foundBook.title, foundBook.flb_id);
            scanResult.innerText = `✅ Scanned: ${scannedVal}`;
            scanResult.style.display = "block";
            stopScanner();
        } else {
            alert(`Book [${scannedVal}] is currently out of stock.`);
        }
    } else {
        alert(`No book found with ID or FLB_ID: ${scannedVal}`);
    }
}

function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => {
            reader.style.display = "none";
            toggleScannerBtn.innerHTML = '<i class="bi bi-qr-code-scan"></i> Scan QR/Barcode';
        }).catch(err => console.error(err));
    } else {
        reader.style.display = "none";
        toggleScannerBtn.innerHTML = '<i class="bi bi-qr-code-scan"></i> Scan QR/Barcode';
    }
}

// ------------------- LOAD BOOKS -------------------
function loadBooks() {
    return fetch("/api/books/", {
        headers: { Authorization: "Bearer " + token }
    })
    .then(res => res.json())
    .then(data => {
        allBooks = data.results || data; // Store books locally for search
    })
    .catch(err => console.error("Books load error:", err));
}


// ------------------- LOAD USERS -------------------
async function loadUsers() {
    // First, check the current user's role
    const meRes = await fetch("/api/auth/me/", {
        headers: { Authorization: "Bearer " + token }
    });
    const me = await meRes.json();

    if (!me.is_superuser) {
        // If not admin, hide user selection search and pre-set to current user
        document.getElementById("user-selection-group").style.display = "none";
        selectedUserIdInput.value = me.id;
        return;
    }

    // If admin, load all users for the search list
    return fetch("/api/auth/users/", {
        headers: { Authorization: "Bearer " + token }
    })
    .then(res => res.json())
    .then(data => {
        allUsers = data.results || data; // Store users locally for search
    })
    .catch(err => console.error("Users load error:", err));
}


// ------------------- INIT -------------------
Promise.all([loadBooks(), loadUsers()]).then(() => {
    // Auto-start scanner if requested via URL
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('scan') === 'true') {
        if (reader.style.display === "none") {
            reader.style.display = "block";
            toggleScannerBtn.innerHTML = '<i class="bi bi-x-circle-fill"></i> Stop Scanner';
            startScanner();
        }
    }
});

// ------------------- ISSUE BOOK -------------------
function issueBook() {
    const bookId = selectedBookIdInput.value;
    const userId = userSelect.value;

    if (!bookId || !userId) {
        alert("Please select both a book and a user.");
        return;
    }

    // Disable button to prevent double-click
    issueBtn.disabled = true;

    fetch("/api/issue-books/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
        },
        body: JSON.stringify({
            book: Number(bookId),
            user: Number(userId)
        })
    })
    .then(async res => {
        const data = await res.json();
        if (!res.ok) {
            throw new Error(data.error || "Error issuing book. Check console.");
        }
        alert("✅ Book issued successfully!");
        window.location.href = "/issued-books/";
    })
    .catch(err => {
        console.error(err);
        alert(err.message);
        issueBtn.disabled = false;
    });
}
</script>

{% endblock %}
