<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">
        <h4 class="mb-2 mb-md-0">
            <i class="bi bi-journal-bookmark-fill"></i> Issued Books

        </table>
    </div>

    <!-- Pagination -->
    <div class="d-flex justify-content-between align-items-center mt-3">
        <button class="btn btn-outline-secondary" id="prevBtn" disabled>
            ⬅ Previous
        </button>

        <span class="fw-bold text-muted">
            Page <span id="currentPage">1</span>
        </span>

        <button class="btn btn-outline-secondary" id="nextBtn" disabled>
            Next ➡
        </button>
    </div>

</div>

<script>
const token = localStorage.getItem("access");
if (!token) window.location.href = "/";

const issuedAPI = "/api/issue-books/";

let currentPage = 1;
let nextPage = null;
let prevPage = null;

// ---------------- INIT ----------------
loadIssuedBooks();

// ---------------- LOAD ISSUED BOOKS ----------------
function loadIssuedBooks(url = `${issuedAPI}?page=${currentPage}`) {
    fetch(url, {
        headers: { Authorization: "Bearer " + token }
    })
    .then(res => res.json())
    .then(data => {

        const items = data.results || [];

        nextPage = data.next;
        prevPage = data.previous;

        document.getElementById("nextBtn").disabled = !nextPage;
        document.getElementById("prevBtn").disabled = !prevPage;
        document.getElementById("currentPage").innerText = currentPage;

        let rows = "";

        if (!items.length) {
            rows = `
                <tr>
                    <td colspan="8" class="text-muted py-3">
                        No issued books found
                    </td>
                </tr>
            `;
        } else {
            items.forEach((item, index) => {
                rows += `
                    <tr>
                        <td>${((currentPage - 1) * 10) + index + 1}</td>
                        <td class="fw-bold text-primary">${item.book_flb_id || "-"}</td>
                        <td class="fw-bold">${item.book_title || "Unknown"}</td>
                        <td>${item.user_name || "-"}</td>
                        <td>${item.email || "-"}</td>
                        <td>${formatDate(item.issue_timestamp)}</td>
                        <td>${item.return_timestamp ? formatDate(item.return_timestamp) : "-"}</td>
                        <td>
                            <span class="badge ${item.returned ? "bg-success" : "bg-warning text-dark"}">
                                ${item.returned ? "Returned" : "Issued"}
                            </span>
                        </td>
                        <td>
                            ${
                                item.returned
                                ? `<button class="btn btn-sm btn-outline-danger fw-bold"
                                           onclick="toggleReturnStatus(${item.id}, false)">
                                        <i class="bi bi-arrow-counterclockwise"></i> Undo
                                   </button>`
                                : `<button class="btn btn-sm btn-primary fw-bold"
                                          onclick="toggleReturnStatus(${item.id}, true)">
                                        <i class="bi bi-check-circle-fill"></i> Return
                                   </button>`
                            }
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById("issued-table").innerHTML = rows;
    })
    .catch(err => {
        console.error(err);
        alert("Failed to load issued books");
    });
}

// ---------------- PAGINATION BUTTONS ----------------
document.getElementById("nextBtn").onclick = () => {
    if (nextPage) {
        currentPage++;
        loadIssuedBooks(nextPage);
    }
};

document.getElementById("prevBtn").onclick = () => {
    if (prevPage) {
        currentPage--;
        loadIssuedBooks(prevPage);
    }
};

// ---------------- TOGGLE RETURN STATUS ----------------
function toggleReturnStatus(id, newStatus) {
    const actionText = newStatus ? "Mark this book as returned?" : "Undo return? (This will re-issue the book)";
    if (!confirm(actionText)) return;

    fetch(`${issuedAPI}${id}/`, {
        method: "PATCH",
        headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
        },
        body: JSON.stringify({ returned: newStatus })
    })
    .then(async res => {
        if (!res.ok) {
            const errorData = await res.json();
            throw new Error(errorData.error || "Action failed");
        }
        loadIssuedBooks();
    })
    .catch(err => alert("Error: " + err.message));
}

// ---------------- DATE FORMAT ----------------
function formatDate(date) {
    if (!date) return "-";
    const d = new Date(date);
    if (isNaN(d.getTime())) return "Invalid Date";
    return d.toLocaleString(); // Returns date and time as timestamp
}
</script>
