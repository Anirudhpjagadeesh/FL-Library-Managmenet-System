{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card">
            <h5 class="fw-bold mb-3">
                <i class="bi bi-person-circle"></i> My Profile
            </h5>

            <table class="table table-borderless">
                <tr>
                    <th>Username</th>
                    <td id="prof-username">-</td>
                </tr>
                <tr>
                    <th>Email</th>
                    <td id="prof-email">-</td>
                </tr>
                <tr>
                    <th>Role</th>
                    <td id="prof-role">-</td>
                </tr>
                <tr>
                    <th>Joined</th>
                    <td id="prof-joined">-</td>
                </tr>
            </table>

        </div>

    </div>
</div>

<script>
    const token = localStorage.getItem("access");
    if (!token) window.location.href = "/";

    fetch("/api/auth/me/", {
        headers: { Authorization: "Bearer " + token }
    })
    .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
    })
    .then(user => {
        document.getElementById("prof-username").innerText = user.username;
        document.getElementById("prof-email").innerText = user.email;
        document.getElementById("prof-role").innerText = user.is_superuser ? "Admin" : "User";
        document.getElementById("prof-joined").innerText = new Date(user.date_joined).toLocaleDateString(undefined, {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
    })
    .catch(() => alert("Failed to load profile"));
</script>

{% endblock %}
